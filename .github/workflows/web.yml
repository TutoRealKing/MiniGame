name: Export Godot Web

on:
  push:
    branches:
      - main

jobs:
  export-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Export Godot Project
        uses: firebelley/godot-export@v5.2.0
        with:
          godot_version: 3.6.2
          export_name: MiniGame
          export_preset: HTML5